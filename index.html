<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meetingraum-Konfigurator</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #009DDF;
      --bg: #f5f4f1;
      --surface: #ffffff;
      --text: #131313;
      --muted: #666662;
      --muted-soft: #898985;
      --line: #e6e4de;
      --line-strong: #d7d4cd;
      --success: #1e7e34;
      --warning: #9a5f08;
      --radius: 16px;
      --radius-lg: 20px;
      --max: 880px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --shadow-soft: 0 12px 28px rgba(20,20,20,.05);
      --shadow-card: 0 14px 32px rgba(20,20,20,.06);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', system-ui, sans-serif;
      min-height: 100vh;
      padding: 30px 16px 44px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, textarea { font: inherit; }
    .app { max-width: var(--max); margin: 0 auto; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .logo-wrap img {
      width: 74%;
      height: 74%;
      object-fit: contain;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .step-counter {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .progress-shell {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      overflow: hidden;
      margin-bottom: 26px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--brand);
      border-radius: inherit;
      transition: width .45s var(--ease);
    }

    .hero {
      margin-bottom: 20px;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 600;
      max-width: 16ch;
      color: var(--text);
    }

    .subtitle {
      margin: 0;
      max-width: 58ch;
      font-size: 1rem;
      line-height: 1.68;
      color: #4f4f4c;
    }

    .notice {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #f0ddbe;
      background: #fff7eb;
      color: var(--warning);
      font-size: .92rem;
      line-height: 1.55;
    }

    .content {
      animation: fadeIn .28s var(--ease);
    }

    .helper {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.55;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .cards.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cards.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: inherit;
      text-align: left;
      padding: 18px;
      min-height: 188px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer;
      transition: transform .24s var(--ease), border-color .24s var(--ease), box-shadow .24s var(--ease), background .24s var(--ease);
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--line-strong);
      box-shadow: var(--shadow-soft);
    }

    .card.selected {
      border-color: rgba(0,157,223,.35);
      background: linear-gradient(180deg, #ffffff, #f9fdff);
      box-shadow: 0 0 0 2px rgba(0,157,223,.08), var(--shadow-card);
    }

    .card.disabled {
      opacity: .48;
      filter: grayscale(.06);
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .card-title {
      margin: 0 0 6px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--text);
    }

    .card-desc {
      margin: 0;
      font-size: .9rem;
      line-height: 1.58;
      color: #565652;
    }

    .mini-label {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted-soft);
      background: #f6f5f1;
      border: 1px solid #ece9e2;
      border-radius: 999px;
      padding: 6px 9px;
    }

    .illustration {
      height: 86px;
      border-radius: 14px;
      background: #f7f7f4;
      border: 1px solid #efede7;
      position: relative;
      overflow: hidden;
    }

    .room-illu::before {
      content: "";
      position: absolute;
      inset: 18px 22px 16px;
      background: #fff;
      border: 1px solid #eceae5;
      border-radius: 14px;
    }

    .room-illu::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 34%;
      height: 10px;
      border-radius: 999px;
      background: var(--brand);
    }

    .people {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .person {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(0,157,223,.86);
    }

    .display-illu.single::before,
    .display-illu.dual::before,
    .display-illu.dual::after {
      content: "";
      position: absolute;
      top: 18px;
      width: 64px;
      height: 38px;
      border-radius: 10px;
      background: #171717;
      box-shadow: inset 0 0 0 2px #e8f7fd;
    }

    .display-illu.single::before { left: 50%; transform: translateX(-50%); }
    .display-illu.dual::before { left: 18px; }
    .display-illu.dual::after { right: 18px; }

    .display-illu.single span,
    .display-illu.dual span {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 42px;
      height: 4px;
      border-radius: 999px;
      background: #b9b7b0;
      display: block;
    }

    .display-illu.touch::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 12px;
      width: 92px;
      height: 58px;
      transform: translateX(-50%);
      border-radius: 16px;
      background: linear-gradient(180deg, #122333, #1e3e54);
      box-shadow: inset 0 0 0 2px #e8f7fd;
    }

    .display-illu.touch::after {
      content: "";
      position: absolute;
      right: 20px;
      bottom: 12px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 8px rgba(0,157,223,.10);
    }

    .display-illu.touch span {
      position: absolute;
      left: 50%;
      top: 28px;
      width: 22px;
      height: 22px;
      transform: translateX(-50%);
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.92);
      background: rgba(255,255,255,.10);
      display: block;
    }

    .door-illu::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 14px;
      width: 52px;
      height: 58px;
      border-radius: 12px 12px 0 0;
      border: 1px solid #e6e3dc;
      background: #fff;
    }

    .door-illu::after {
      content: "";
      position: absolute;
      left: 82px;
      top: 28px;
      width: 48px;
      height: 18px;
      border-radius: 6px;
      background: var(--brand);
    }

    .mount-illu.wall::before,
    .mount-illu.free::before {
      content: "";
      position: absolute;
      inset: 18px 20px auto;
      height: 34px;
      background: #171717;
      border-radius: 10px;
      box-shadow: inset 0 0 0 2px #edf7fb;
    }

    .mount-illu.wall::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 56px;
      width: 4px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #999791;
    }

    .mount-illu.free::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 52px;
      transform: translateX(-50%);
      width: 34px;
      height: 18px;
      border: 3px solid #999791;
      border-top: 0;
      border-radius: 0 0 14px 14px;
    }

    .ceiling-illu::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 16px;
      height: 4px;
      border-radius: 999px;
      background: #d4d2cc;
    }

    .ceiling-illu::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--brand);
      box-shadow: 0 0 0 8px rgba(0,157,223,.10);
    }

    .grid-note {
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      padding: 12px;
    }

    .summary-grid,
    .form-grid {
      display: grid;
      gap: 10px;
    }

    .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-bottom: 10px; }
    .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .summary-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }

    .summary-card h4 {
      margin: 0 0 8px;
      font-size: .92rem;
      font-weight: 500;
      color: var(--muted);
    }

    .summary-card p,
    .summary-card ul {
      margin: 0;
      padding-left: 0;
      list-style-position: inside;
      line-height: 1.6;
      color: var(--text);
    }

    .field { display: grid; gap: 8px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: .9rem; color: #2f2f2c; }
    .required { color: #cf2f2f; }

    input, textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    textarea { min-height: 110px; resize: vertical; }
    input:focus, textarea:focus {
      border-color: rgba(0,157,223,.4);
      box-shadow: 0 0 0 3px rgba(0,157,223,.10);
    }

    .check {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .check input {
      width: 18px;
      min-height: 18px;
      margin-top: 2px;
      box-shadow: none;
    }

    .json-preview {
      background: #111;
      color: #e8f6fb;
      border-radius: 14px;
      padding: 16px;
      overflow: auto;
      font-size: .86rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .status {
      font-size: .9rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      appearance: none;
      border: none;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      font-size: .92rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform .2s var(--ease), opacity .2s var(--ease), background .2s var(--ease), color .2s var(--ease);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #fff; color: #222; border: 1px solid var(--line); }
    .btn-primary { background: #111; color: #fff; }
    .btn-primary:hover { background: #222; }

    .success {
      display: none;
      margin-top: 8px;
      padding: 13px 14px;
      border-radius: 12px;
      background: #edf8ef;
      border: 1px solid #d7ecd9;
      color: var(--success);
      font-size: .92rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      .cards.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary-grid, .form-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      body { padding: 20px 14px 36px; }
      .topbar { flex-direction: column; align-items: flex-start; }
      .cards, .cards.cols-2, .cards.cols-4 { grid-template-columns: 1fr; }
      .actions { flex-direction: column; align-items: stretch; }
      .btn-row, .btn { width: 100%; }
      .title { max-width: 14ch; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo-wrap">
          <img src="cotive-08.png" alt="Firmenlogo" onerror="this.src='cotive-07.png';this.onerror=function(){this.style.display='none';};">
        </div>
        <h1>Meetingraum-Konfigurator</h1>
      </div>
      <div class="step-counter" id="progressLabel">Schritt 1 von 9</div>
    </header>

    <div class="progress-shell"><div class="progress-bar" id="progressBar"></div></div>

    <section class="hero">
      <h2 class="title" id="stepTitle">Wie viele Personen nutzen den Raum typischerweise?</h2>
      <p class="subtitle" id="stepSubtitle">Wählen Sie die passende Raumgröße. Die nächsten Schritte passen sich daran an.</p>
      <div class="notice" id="noticeBox"></div>
    </section>

    <main class="content" id="content"></main>

    <footer class="actions">
      <div class="status" id="footerNote">Wählen Sie eine Option, um fortzufahren.</div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="backBtn">Zurück</button>
        <button class="btn btn-primary" id="nextBtn">Weiter</button>
      </div>
    </footer>
  </div>

  <script>
    const state = {
      currentStep: 0,
      answers: {
        roomSize: "",
        budget: "",
        display: "",
        doorSign: "",
        mounting: "",
        ceilingMic: "",
        requirements: [],
        roomConditions: [],
        contact: {
          name: "",
          company: "",
          email: "",
          phone: "",
          message: "",
          privacy: false
        }
      }
    };

    const optionLabelMap = {
      roomSize: {
        huddle: "Huddle (1–4 Personen)",
        medium: "Medium (5–8 Personen)",
        large: "Large (9–16 Personen)",
        individual: "Individual (17+ Personen)"
      },
      budget: {
        under_5000: "Unter 5.000 €",
        between_5000_15000: "5.000 € – 15.000 €",
        over_15000: "Über 15.000 €"
      },
      display: {
        single: "Single Display",
        dual: "Dual Display",
        touch: "Touch Display"
      },
      doorSign: { yes: "Ja", no: "Nein" },
      mounting: { wall: "Wandmontage", free: "Freistehend" },
      ceilingMic: { yes: "Ja", no: "Nein", unsure: "Nicht sicher" },
      requirements: {
        wide_angle: "Weitwinkelkamera",
        ptz: "PTZ Kamera",
        speaker_tracking: "Speaker Tracking",
        auto_framing: "Auto Framing",
        byod: "BYOD Nutzung",
        mtr: "Microsoft Teams Rooms",
        zoom: "Zoom Rooms"
      },
      roomConditions: {
        glass: "Viel Glas",
        poor_acoustics: "Schlechte Akustik",
        acoustic_panels: "Akustikpaneele vorhanden",
        acoustic_measurement: "Raumakustik Messung gewünscht",
        high_ceilings: "Hohe Decken",
        sunlight: "Starke Sonneneinstrahlung"
      }
    };

    const steps = [
      {
        key: "roomSize",
        title: "Wie viele Personen nutzen den Raum typischerweise?",
        subtitle: "Wählen Sie die passende Raumgröße. Die nächsten Schritte passen sich daran an.",
        type: "single",
        note: () => state.answers.roomSize === "individual"
          ? "Für Räume ab 17 Personen empfehlen wir eine individuelle Beratung. Sie können den Konfigurator trotzdem fortsetzen."
          : "",
        options: [
          { value: "huddle", title: "Huddle", desc: "1–4 Personen", tag: "Klein", people: 4 },
          { value: "medium", title: "Medium", desc: "5–8 Personen", tag: "Standard", people: 8 },
          { value: "large", title: "Large", desc: "9–16 Personen", tag: "Groß", people: 12 },
          { value: "individual", title: "Individual", desc: "17+ Personen", tag: "Beratung", people: 16 }
        ]
      },
      {
        key: "budget",
        title: "Welches Budget ist geplant?",
        subtitle: "Die Budgetspanne hilft bei der Einordnung der passenden Lösung.",
        type: "single",
        options: [
          { value: "under_5000", title: "Unter 5.000 €", desc: "Einstiegslösung", tag: "Budget" },
          { value: "between_5000_15000", title: "5.000 € – 15.000 €", desc: "Ausgewogene Ausstattung", tag: "Empfohlen" },
          { value: "over_15000", title: "Über 15.000 €", desc: "Premium-Setup", tag: "High-End" }
        ]
      },
      {
        key: "display",
        title: "Welche Display-Lösung wird benötigt?",
        subtitle: "Die Displaywahl beeinflusst Zusammenarbeit, Platzbedarf und Montage.",
        type: "single",
        helper: () => state.answers.roomSize === "huddle" ? "Dual Display ist für Huddle-Räume deaktiviert." : "",
        options: [
          { value: "single", title: "Single Display", desc: "Ein zentrales Display", tag: "Klassisch" },
          { value: "dual", title: "Dual Display", desc: "Zwei getrennte Displays", tag: "Erweitert", disabled: () => state.answers.roomSize === "huddle" },
          { value: "touch", title: "Touch Display", desc: "Ein interaktives Touch-Display", tag: "Interaktiv" }
        ]
      },
      {
        key: "doorSign",
        title: "Soll ein digitales Türschild integriert werden?",
        subtitle: "Optional für Raumstatus und Buchungsanzeige.",
        type: "single",
        options: [
          { value: "yes", title: "Ja", desc: "Mit Belegungsanzeige", tag: "Optional" },
          { value: "no", title: "Nein", desc: "Nicht erforderlich", tag: "Optional" }
        ]
      },
      {
        key: "mounting",
        title: "Welche Montageart ist möglich?",
        subtitle: "Davon hängen Hardware und Installationsaufwand ab.",
        type: "single",
        options: [
          { value: "wall", title: "Wandmontage", desc: "Fest installiert", tag: "Fix" },
          { value: "free", title: "Freistehend", desc: "Flexibler Aufbau", tag: "Flexibel" }
        ]
      },
      {
        key: "ceilingMic",
        title: "Kann ein Mikrofon an der Decke montiert werden?",
        subtitle: "Wichtig für die Auswahl der Audiolösung.",
        type: "single",
        options: [
          { value: "yes", title: "Ja", desc: "Deckenmontage ist möglich", tag: "Sicher" },
          { value: "no", title: "Nein", desc: "Alternative Mikrofonierung", tag: "Eingeschränkt" },
          { value: "unsure", title: "Nicht sicher", desc: "Wird später geklärt", tag: "Offen" }
        ]
      },
      {
        key: "requirements",
        title: "Welche Funktionen werden benötigt?",
        subtitle: "Mehrfachauswahl möglich.",
        type: "multi",
        options: [
          { value: "wide_angle", title: "Weitwinkelkamera", desc: "Mehr Raum im Bild", tag: "Kamera" },
          { value: "ptz", title: "PTZ Kamera", desc: "Schwenken, neigen, zoomen", tag: "Kamera" },
          { value: "speaker_tracking", title: "Speaker Tracking", desc: "Fokus auf Sprecher", tag: "AI" },
          { value: "auto_framing", title: "Auto Framing", desc: "Automatische Bildanpassung", tag: "AI" },
          { value: "byod", title: "BYOD Nutzung", desc: "Eigene Geräte nutzen", tag: "Flexibel" },
          { value: "mtr", title: "Microsoft Teams Rooms", desc: "Native Teams-Raumerfahrung", tag: "Plattform" },
          { value: "zoom", title: "Zoom Rooms", desc: "Native Zoom-Raumerfahrung", tag: "Plattform" }
        ]
      },
      {
        key: "roomConditions",
        title: "Welche Besonderheiten hat der Raum?",
        subtitle: "Mehrfachauswahl möglich.",
        type: "multi",
        options: [
          { value: "glass", title: "Viel Glas", desc: "Reflexionen beachten", tag: "Licht" },
          { value: "poor_acoustics", title: "Schlechte Akustik", desc: "Sprachverständlichkeit optimieren", tag: "Akustik" },
          { value: "acoustic_panels", title: "Akustikpaneele vorhanden", desc: "Gute Voraussetzung", tag: "Akustik" },
          { value: "acoustic_measurement", title: "Raumakustik Messung gewünscht", desc: "Beratung erwünscht", tag: "Service" },
          { value: "high_ceilings", title: "Hohe Decken", desc: "Wichtig für Montage", tag: "Baulich" },
          { value: "sunlight", title: "Starke Sonneneinstrahlung", desc: "Display-Helligkeit beachten", tag: "Licht" }
        ]
      },
      {
        key: "summary",
        title: "Zusammenfassung Ihrer Konfiguration",
        subtitle: "Prüfen Sie die Angaben und senden Sie anschließend die Anfrage ab.",
        type: "summary"
      }
    ];

    const els = {
      progressLabel: document.getElementById("progressLabel"),
      progressBar: document.getElementById("progressBar"),
      stepTitle: document.getElementById("stepTitle"),
      stepSubtitle: document.getElementById("stepSubtitle"),
      noticeBox: document.getElementById("noticeBox"),
      content: document.getElementById("content"),
      footerNote: document.getElementById("footerNote"),
      nextBtn: document.getElementById("nextBtn"),
      backBtn: document.getElementById("backBtn")
    };

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", "&#039;");
    }

    function isStepComplete(step) {
      if (step.type === "summary") return true;
      const value = state.answers[step.key];
      if (step.type === "multi") return Array.isArray(value) && value.length > 0;
      return value !== "";
    }

    function canContinue() {
      const step = steps[state.currentStep];
      if (step.type === "summary") {
        const c = state.answers.contact;
        return Boolean(c.name && c.company && c.email && c.phone && c.privacy);
      }
      return isStepComplete(step);
    }

    function getProgress() {
      const total = steps.length;
      const current = state.currentStep + 1;
      return { current, total, percent: Math.round((current / total) * 100) };
    }

    function renderIllustration(stepKey, option) {
      if (stepKey === "roomSize") {
        const people = Array.from({ length: Math.min(option.people || 0, 8) }, () => '<span class="person"></span>').join("");
        return `<div class="illustration room-illu"><div class="people">${people}</div></div>`;
      }
      if (stepKey === "display") {
        const cls = option.value === "single" ? "single" : option.value === "dual" ? "dual" : "touch";
        return `<div class="illustration display-illu ${cls}"><span></span></div>`;
      }
      if (stepKey === "doorSign") return '<div class="illustration door-illu"></div>';
      if (stepKey === "mounting") return `<div class="illustration mount-illu ${option.value === "wall" ? "wall" : "free"}"></div>`;
      if (stepKey === "ceilingMic") return '<div class="illustration ceiling-illu"></div>';
      if (stepKey === "roomConditions") return '<div class="illustration grid-note">Raumfaktoren auswählen</div>';
      return '<div class="illustration"></div>';
    }

    function renderCards(step) {
      const currentValue = state.answers[step.key];
      const colsClass = step.options.length === 2 ? "cols-2" : step.options.length >= 4 ? "cols-4" : "";
      const helper = typeof step.helper === "function" ? step.helper() : "";

      const cards = step.options.map((option) => {
        const disabled = typeof option.disabled === "function" ? option.disabled() : false;
        const selected = step.type === "multi"
          ? currentValue.includes(option.value)
          : currentValue === option.value;

        return `
          <button type="button" class="card ${selected ? "selected" : ""} ${disabled ? "disabled" : ""}" data-value="${option.value}" ${disabled ? "disabled" : ""}>
            <div class="meta">
              <div>
                <div class="card-title">${escapeHtml(option.title)}</div>
                <p class="card-desc">${escapeHtml(option.desc)}</p>
              </div>
              <span class="mini-label">${escapeHtml(option.tag || "Option")}</span>
            </div>
            ${renderIllustration(step.key, option)}
          </button>
        `;
      }).join("");

      return `
        ${helper ? `<p class="helper">${escapeHtml(helper)}</p>` : ""}
        <div class="cards ${colsClass}">${cards}</div>
      `;
    }

    function listLabels(key, values) {
      if (!Array.isArray(values) || !values.length) return "Keine Auswahl";
      return `<ul>${values.map((item) => `<li>${escapeHtml(optionLabelMap[key][item] || item)}</li>`).join("")}</ul>`;
    }

    function getPayload() {
      return {
        roomSize: state.answers.roomSize,
        budget: state.answers.budget,
        display: state.answers.display,
        doorSign: state.answers.doorSign === "yes",
        mounting: state.answers.mounting,
        ceilingMic: state.answers.ceilingMic,
        requirements: state.answers.requirements,
        roomConditions: state.answers.roomConditions,
        contact: {
          name: state.answers.contact.name,
          company: state.answers.contact.company,
          email: state.answers.contact.email,
          phone: state.answers.contact.phone,
          message: state.answers.contact.message
        }
      };
    }

    const apiService = {
      async submitLead(payload) {
        await new Promise((resolve) => setTimeout(resolve, 700));
        return { ok: true, status: 200, data: payload };
      }
    };

    function renderSummary() {
      const payload = getPayload();
      return `
        <div class="summary-grid">
          <div class="summary-card"><h4>Raumgröße</h4><p>${escapeHtml(optionLabelMap.roomSize[state.answers.roomSize] || "-")}</p></div>
          <div class="summary-card"><h4>Budget</h4><p>${escapeHtml(optionLabelMap.budget[state.answers.budget] || "-")}</p></div>
          <div class="summary-card"><h4>Display</h4><p>${escapeHtml(optionLabelMap.display[state.answers.display] || "-")}</p></div>
          <div class="summary-card"><h4>Türschild</h4><p>${escapeHtml(optionLabelMap.doorSign[state.answers.doorSign] || "-")}</p></div>
          <div class="summary-card"><h4>Montage</h4><p>${escapeHtml(optionLabelMap.mounting[state.answers.mounting] || "-")}</p></div>
          <div class="summary-card"><h4>Deckenmikrofon</h4><p>${escapeHtml(optionLabelMap.ceilingMic[state.answers.ceilingMic] || "-")}</p></div>
          <div class="summary-card"><h4>Funktionen</h4>${listLabels("requirements", state.answers.requirements)}</div>
          <div class="summary-card"><h4>Raumgegebenheiten</h4>${listLabels("roomConditions", state.answers.roomConditions)}</div>
        </div>

        <div class="summary-card" style="margin-bottom:10px;">
          <h4>Kontakt</h4>
          <div class="form-grid">
            <div class="field">
              <label for="name">Name <span class="required">*</span></label>
              <input id="name" placeholder="Max Mustermann" value="${escapeHtml(state.answers.contact.name)}" />
            </div>
            <div class="field">
              <label for="company">Firma <span class="required">*</span></label>
              <input id="company" placeholder="Muster GmbH" value="${escapeHtml(state.answers.contact.company)}" />
            </div>
            <div class="field">
              <label for="email">E-Mail <span class="required">*</span></label>
              <input id="email" type="email" placeholder="name@firma.de" value="${escapeHtml(state.answers.contact.email)}" />
            </div>
            <div class="field">
              <label for="phone">Telefon <span class="required">*</span></label>
              <input id="phone" placeholder="+49 ..." value="${escapeHtml(state.answers.contact.phone)}" />
            </div>
            <div class="field full">
              <label for="message">Nachricht</label>
              <textarea id="message" placeholder="Weitere Hinweise ...">${escapeHtml(state.answers.contact.message)}</textarea>
            </div>
            <div class="field full">
              <label class="check">
                <input id="privacy" type="checkbox" ${state.answers.contact.privacy ? "checked" : ""} />
                <span>Ich stimme der Verarbeitung meiner Daten zur Bearbeitung meiner Anfrage zu. <span class="required">*</span></span>
              </label>
            </div>
          </div>
        </div>

        <div class="summary-card">
          <h4>JSON Payload</h4>
          <pre class="json-preview">${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
          <div class="success" id="successBox">Vielen Dank. Die Demo hat den Payload erfolgreich an den vorbereiteten API-Layer übergeben.</div>
        </div>
      `;
    }

    function bindCardEvents(step) {
      els.content.querySelectorAll('.card').forEach((card) => {
        card.addEventListener('click', () => {
          const { value } = card.dataset;
          if (step.type === 'single') {
            state.answers[step.key] = value;
            if (step.key === 'roomSize' && value === 'huddle' && state.answers.display === 'dual') {
              state.answers.display = '';
            }
          } else {
            const list = state.answers[step.key];
            const index = list.indexOf(value);
            if (index > -1) list.splice(index, 1);
            else list.push(value);
          }
          render();
        });
      });
    }

    function bindSummaryInputs() {
      ["name", "company", "email", "phone", "message"].forEach((id) => {
        const input = document.getElementById(id);
        input.addEventListener("input", (e) => {
          state.answers.contact[id] = e.target.value;
          els.nextBtn.disabled = !canContinue();
        });
      });

      document.getElementById("privacy")?.addEventListener("change", (e) => {
        state.answers.contact.privacy = e.target.checked;
        els.nextBtn.disabled = !canContinue();
      });
    }

    function render() {
      const step = steps[state.currentStep];
      const progress = getProgress();

      els.progressLabel.textContent = `Schritt ${progress.current} von ${progress.total}`;
      els.progressBar.style.width = `${progress.percent}%`;
      els.stepTitle.textContent = step.title;
      els.stepSubtitle.textContent = step.subtitle;

      const note = typeof step.note === 'function' ? step.note() : '';
      els.noticeBox.style.display = note ? 'block' : 'none';
      els.noticeBox.textContent = note;

      if (step.type === 'summary') {
        els.content.innerHTML = renderSummary();
        bindSummaryInputs();
        els.nextBtn.textContent = 'Anfrage absenden';
        els.footerNote.textContent = 'Pflichtfelder ausfüllen und Datenschutz bestätigen.';
      } else {
        els.content.innerHTML = renderCards(step);
        bindCardEvents(step);
        els.nextBtn.textContent = 'Weiter';
        els.footerNote.textContent = step.type === 'multi'
          ? 'Mehrfachauswahl möglich.'
          : 'Wählen Sie eine Option, um fortzufahren.';
      }

      els.backBtn.disabled = state.currentStep === 0;
      els.nextBtn.disabled = !canContinue();
    }

    els.backBtn.addEventListener('click', () => {
      if (state.currentStep > 0) {
        state.currentStep -= 1;
        render();
      }
    });

    els.nextBtn.addEventListener('click', async () => {
      if (!canContinue()) return;

      const isSummary = steps[state.currentStep].type === 'summary';
      if (!isSummary) {
        state.currentStep += 1;
        render();
        return;
      }

      els.nextBtn.disabled = true;
      els.nextBtn.textContent = 'Wird gesendet ...';
      try {
        const payload = getPayload();
        const result = await apiService.submitLead(payload);
        if (result.ok) {
          const success = document.getElementById('successBox');
          if (success) success.style.display = 'block';
          els.footerNote.textContent = 'Demo erfolgreich abgeschlossen.';
          els.nextBtn.textContent = 'Erfolgreich gesendet';
        } else {
          els.nextBtn.textContent = 'Erneut versuchen';
          els.nextBtn.disabled = false;
        }
      } catch (error) {
        console.error(error);
        els.footerNote.textContent = 'Fehler beim Senden des Demo-Payloads.';
        els.nextBtn.textContent = 'Erneut versuchen';
        els.nextBtn.disabled = false;
      }
    });

    render();
  </script>
</body>
</html>
